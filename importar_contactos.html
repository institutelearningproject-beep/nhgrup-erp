      if (error) throw error;
      added += lote.length;
      bar.style.width = Math.round((added / Math.max(paraInsertar.length, 1)) * 100) + '%';
      status.textContent = 'Guardando en Supabase ' + added + ' / ' + paraInsertar.length + '...';
    }

    bar.style.width = '100%';
    status.textContent = '\u2713 ' + added + ' clientes nuevos agregados (' + dupes + ' duplicados omitidos)';
    sub.innerHTML = 'Total en CRM: <strong>' + (totalExistentes + added) + '</strong> clientes';
    document.getElementById('btnGo').style.display = 'inline-block';
  } catch (err) {
    status.textContent = '\u26a0 Error: ' + (err.message || err);
  }
}

window.addEventListener('load', () => setTimeout(run, 200));
</script>
</body>
</html>
