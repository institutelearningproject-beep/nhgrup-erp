  status.textContent = 'Consultando Supabase...';
  try {

      for (let i = 0; i < paraInsertar.length; i += 20) {
        const lote = paraInsertar.slice(i, i + 20);
        await sb.from('propiedades').insert(lote.map(p => ({
          nombre: p.nombre, tipo: p.tipo, operacion: p.operacion,
          estado: p.estado, direccion: p.direccion, m2: p.m2,
